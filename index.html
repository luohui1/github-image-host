<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>图床 · GitHub + jsDelivr</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./assets/app.css" />
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>

  <header class="top">
    <div class="brand">
      <span class="mark" aria-hidden="true"></span>
      <div>
        <p class="brand-name">Framebin</p>
        <p class="brand-sub">GitHub + jsDelivr 图床</p>
      </div>
    </div>
    <nav class="tabs" role="tablist">
      <button class="tab is-active" data-tab="gallery" type="button">图库</button>
      <button class="tab" data-tab="upload" type="button">上传</button>
      <button class="tab" data-tab="settings" type="button">设置</button>
    </nav>
  </header>

  <main>
    <section id="panel-gallery" class="panel is-active">
      <div class="panel-head">
        <h1>图库</h1>
        <p>点击图片复制 jsDelivr 外链</p>
        <button id="refreshBtn" class="ghost" type="button">刷新</button>
      </div>
      <div id="status" class="status" hidden></div>
      <div id="grid" class="grid"></div>
    </section>

    <section id="panel-upload" class="panel">
      <div class="panel-head">
        <h1>上传</h1>
        <p>拖拽或选择图片，写入 GitHub 仓库后即可外链</p>
      </div>
      <div id="dropzone" class="dropzone" tabindex="0">
        <input id="fileInput" type="file" accept="image/*,.svg" multiple hidden />
        <p class="dz-title">把图片拖到这里</p>
        <p class="dz-sub">或点击选择 · PNG / JPG / GIF / WEBP / SVG · ≤ 5MB</p>
      </div>
      <ul id="queue" class="queue"></ul>
    </section>

    <section id="panel-settings" class="panel">
      <div class="panel-head">
        <h1>设置</h1>
        <p>上传需要 GitHub Token（只存在本机浏览器）</p>
      </div>
      <form id="settingsForm" class="settings">
        <label>
          <span>Owner</span>
          <input id="cfgOwner" name="owner" autocomplete="off" />
        </label>
        <label>
          <span>Repo</span>
          <input id="cfgRepo" name="repo" autocomplete="off" />
        </label>
        <label>
          <span>Branch</span>
          <input id="cfgBranch" name="branch" autocomplete="off" />
        </label>
        <label>
          <span>GitHub Token</span>
          <input id="cfgToken" name="token" type="password" autocomplete="off" placeholder="repo 写权限，或 Contents: Read and write" />
        </label>
        <p class="hint">
          在
          <a href="https://github.com/settings/tokens" target="_blank" rel="noreferrer">GitHub Tokens</a>
          创建，勾选 <code>repo</code>（经典）或 Contents Read/Write（细粒度）。Token 仅保存在 localStorage。
        </p>
        <div class="row">
          <button type="submit" class="primary">保存</button>
          <button type="button" id="clearToken" class="ghost">清除 Token</button>
        </div>
      </form>
    </section>
  </main>

  <footer class="foot">
    <a id="repoLink" href="#" target="_blank" rel="noreferrer">仓库</a>
    <span>·</span>
    <span>CDN: jsDelivr</span>
  </footer>

  <div id="toast" class="toast" hidden></div>
  <script src="./assets/app.js"></script>
</body>
</html>
